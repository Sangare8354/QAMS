        <!-- Bottom Save Button -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let settingsModal;
    let refreshInterval;

    document.addEventListener('DOMContentLoaded', function() {
        settingsModal = new bootstrap.Modal(document.getElementById('settingsModal'));
        
        loadFilterPreferences();
        loadUserData();
        loadPendingForms();
        
        refreshInterval = setInterval(function() {
            loadPendingForms();
        }, 30000);
        
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.closest('.input-group').querySelector('input');
                input.type = input.type === 'password' ? 'text' : 'password';
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        });
    });
    
    async function loadUserData() {
        try {
            const response = await fetch('/qams/api/get-user-data.php');
            const data = await response.json();
            
            if (data.success) {
                const user = data.data.profile;
                document.getElementById('deanName').value = user.full_name || 'Prof. Kwame Asante';
                document.getElementById('deanFaculty').value = user.faculty_name || 'Faculty of Computing';
                document.getElementById('deanSemester').value = data.data.current_semester || 'Semester 5';
                document.getElementById('deanYear').value = data.data.current_year || '2025-26';
                document.getElementById('profileName').value = user.full_name || '';
                document.getElementById('profileEmail').value = user.email || '';
                document.getElementById('profileFaculty').value = user.faculty_name || '';
            }
        } catch (error) {
            console.error('Error loading user data:', error);
        }
    }
    
    async function loadPendingForms() {
        const faculty = document.getElementById('quickFaculty')?.value || '';
        const department = document.getElementById('quickDepartment')?.value || '';
        const academicYear = document.getElementById('quickAcademicYear')?.value || '';
        const semester = document.getElementById('quickSemester')?.value || '';
        const status = document.getElementById('quickStatus')?.value || '';
        
        let url = '/qams/api/dean/pending.php?';
        const params = [];
        if (faculty) params.push(`faculty=${encodeURIComponent(faculty)}`);
        if (department) params.push(`department=${encodeURIComponent(department)}`);
        if (academicYear) params.push(`academic_year=${encodeURIComponent(academicYear)}`);
        if (semester) params.push(`semester=${encodeURIComponent(semester)}`);
        if (status) params.push(`status=${encodeURIComponent(status)}`);
        
        url += params.join('&');
        if (params.length === 0) url = '/qams/api/dean/pending.php';
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success) {
                renderSubmissionsTable(data);
                updateActiveFiltersDisplay(faculty, department, academicYear, semester, status);
            } else {
                console.error('Error loading forms:', data.message);
                showToast('❌ ' + data.message);
            }
        } catch (error) {
            console.error('Error:', error);
            showToast('❌ Connection error');
        }
    }
    
    function renderSubmissionsTable(data) {
        const tbody = document.getElementById('submissionsTable');
        
        if (!data.forms || data.forms.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4"><i class="bi bi-inbox fs-1 text-muted"></i><p class="text-muted mt-2 mb-0">No pending submissions</p></td></tr>';
            return;
        }
        
        tbody.innerHTML = data.forms.map((form, index) => {
            const submittedDate = new Date(form.submitted_at).toLocaleString();
            const isPending = form.current_status === 'pending_dean';
            
            return `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${escapeHtml(form.form_number)}</strong></td>
                    <td>${escapeHtml(form.teacher_name)}<br><small class="text-muted">${form.employee_id || ''}</small></td>
                    <td>${escapeHtml(form.course_code)}<br><small class="text-muted">${escapeHtml(form.course_title)}</small></td>
                    <td>${escapeHtml(form.department_name)}</td>
                    <td>${escapeHtml(form.dept_head_name)}</td>
                    <td><small>${submittedDate}</small></td>
                    <td>
                        <button class="btn btn-primary btn-sm me-1" onclick="goToVerification(${form.form_id})">
                            <i class="bi bi-check-circle"></i> Verify
                        </button>
                        ${isPending ? `
                            <button class="btn btn-warning btn-sm" onclick="rejectForm(${form.form_id})">
                                <i class="bi bi-x-circle"></i> Reject
                            </button>
                        ` : ''}
                    </td>
                </tr>
            `;
        }).join('');
    }
    
    // This is the key function - goes to verification panel
    function goToVerification(formId) {
        window.location.href = `dean-verification.html?form_id=${formId}`;
    }
    
    async function rejectForm(formId) {
        const reason = prompt('Please provide reason for rejection (at least 10 characters):');
        if (!reason || reason.length < 10) {
            showToast('❌ Please provide a detailed reason (at least 10 characters)');
            return;
        }
        if (confirm('⚠️ Reject this form and send back to Department Head?')) {
            try {
                const response = await fetch('/qams/api/dean/revert.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ form_id: formId, reason: reason })
                });
                const data = await response.json();
                if (data.success) {
                    showToast('✅ ' + data.message);
                    loadPendingForms();
                } else {
                    showToast('❌ ' + data.message);
                }
            } catch (error) {
                showToast('❌ Connection error');
            }
        }
    }
    
    function updateActiveFiltersDisplay(faculty, department, academicYear, semester, status) {
        const parts = [];
        if (faculty) parts.push(faculty.substring(0, 15));
        if (department) parts.push(department);
        if (academicYear) parts.push(academicYear);
        if (semester) parts.push(`Sem ${semester}`);
        if (status) parts.push(status === 'pending_dean' ? 'Pending' : status === 'pending_qams' ? 'Approved' : status);
        
        const span = document.getElementById('activeFilters');
        if (span) {
            span.textContent = parts.length ? parts.join(' | ') : 'All Filters';
            span.className = parts.length ? 'badge bg-success' : 'badge bg-info';
        }
    }
    
    function applyFilters() {
        const faculty = document.getElementById('quickFaculty')?.value || '';
        const department = document.getElementById('quickDepartment')?.value || '';
        const academicYear = document.getElementById('quickAcademicYear')?.value || '';
        const semester = document.getElementById('quickSemester')?.value || '';
        const status = document.getElementById('quickStatus')?.value || '';
        
        sessionStorage.setItem('deanFaculty', faculty);
        sessionStorage.setItem('deanDepartment', department);
        sessionStorage.setItem('deanAcademicYear', academicYear);
        sessionStorage.setItem('deanSemester', semester);
        sessionStorage.setItem('deanStatus', status);
        
        loadPendingForms();
    }
    
    function resetFilters() {
        document.getElementById('quickFaculty').value = '';
        document.getElementById('quickDepartment').value = '';
        document.getElementById('quickAcademicYear').value = '';
        document.getElementById('quickSemester').value = '';
        document.getElementById('quickStatus').value = '';
        
        sessionStorage.removeItem('deanFaculty');
        sessionStorage.removeItem('deanDepartment');
        sessionStorage.removeItem('deanAcademicYear');
        sessionStorage.removeItem('deanSemester');
        sessionStorage.removeItem('deanStatus');
        
        loadPendingForms();
        showToast('🔄 Filters reset');
    }
    
    function loadFilterPreferences() {
        const faculty = sessionStorage.getItem('deanFaculty') || '';
        const department = sessionStorage.getItem('deanDepartment') || '';
        const academicYear = sessionStorage.getItem('deanAcademicYear') || '';
        const semester = sessionStorage.getItem('deanSemester') || '';
        const status = sessionStorage.getItem('deanStatus') || '';
        
        if (faculty) document.getElementById('quickFaculty').value = faculty;
        if (department) document.getElementById('quickDepartment').value = department;
        if (academicYear) document.getElementById('quickAcademicYear').value = academicYear;
        if (semester) document.getElementById('quickSemester').value = semester;
        if (status) document.getElementById('quickStatus').value = status;
        
        document.getElementById('filterFaculty').value = faculty;
        document.getElementById('filterDepartment').value = department;
        document.getElementById('filterAcademicYear').value = academicYear;
        document.getElementById('filterSemester').value = semester;
        document.getElementById('filterStatus').value = status;
    }
    
    function openSettings() { settingsModal.show(); }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'position-fixed bottom-0 end-0 p-3 m-3 bg-dark text-white rounded shadow';
        toast.style.zIndex = '9999';
        toast.innerHTML = `<i class="bi bi-info-circle me-2"></i>${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // Change password form handler - Copy this to all panels
document.getElementById('changePasswordForm')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const currentPwd = document.getElementById('currentPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    
    // Validation
    if (newPwd.length < 8) {
        alert('❌ Password must be at least 8 characters long');
        return;
    }
    
    if (!/[A-Za-z]/.test(newPwd) || !/[0-9]/.test(newPwd)) {
        alert('❌ Password must contain at least one letter and one number');
        return;
    }
    
    if (newPwd !== confirmPwd) {
        alert('❌ New passwords do not match');
        return;
    }
    
    // Show loading state
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating...';
    
    try {
        const response = await fetch('/qams/api/change-password.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                current: currentPwd, 
                new: newPwd, 
                confirm: confirmPwd 
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('✅ ' + data.message + '\n\nPlease login again with your new password.');
            
            // Clear session storage and redirect to login
            sessionStorage.clear();
            
            // Optional: Add a small delay before redirect
            setTimeout(() => {
                window.location.href = '../Login/index.html';
            }, 1500);
        } else {
            alert('❌ ' + data.message);
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    } catch (error) {
        console.error('Error:', error);
        alert('❌ Connection error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
    }
});
    
    document.getElementById('filterSettingsForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        sessionStorage.setItem('deanFaculty', document.getElementById('filterFaculty').value);
        sessionStorage.setItem('deanDepartment', document.getElementById('filterDepartment').value);
        sessionStorage.setItem('deanAcademicYear', document.getElementById('filterAcademicYear').value);
        sessionStorage.setItem('deanSemester', document.getElementById('filterSemester').value);
        sessionStorage.setItem('deanStatus', document.getElementById('filterStatus').value);
        loadFilterPreferences();
        settingsModal.hide();
        applyFilters();
    });
    
    function showHelp() { alert("🆘 DEAN PANEL HELP:\n\n✅ VERIFY - Go to verification panel to review and approve\n❌ REJECT - Send back to Dept Head with reason\n⚙️ SETTINGS - Profile, password, filters"); }
    function saveAllChanges() { showToast("💾 All changes saved!"); }
  
    // Toggle notification panel
    function toggleNotifications() {
        const panel = document.getElementById('notificationPanel');
        if (panel.style.display === 'none' || panel.style.display === '') {
            panel.style.display = 'block';
            loadNotifications();
        } else {
            panel.style.display = 'none';
        }
    }
    
    // Load notifications from API
    async function loadNotifications() {
        try {
            const response = await fetch('/qams/api/notifications.php?limit=10');
            const data = await response.json();
            
            if (data.success) {
                updateNotificationBadge(data.unread_count);
                renderNotificationList(data.notifications);
            }
        } catch (error) {
            console.error('Error loading notifications:', error);
        }
    }
    
    // Update the red badge number
    function updateNotificationBadge(count) {
        const badge = document.getElementById('notificationBadge');
        if (badge) {
            if (count > 0) {
                badge.textContent = count > 99 ? '99+' : count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }
    }
    
    // Display notifications in the panel
    function renderNotificationList(notifications) {
        const container = document.getElementById('notificationList');
        
        if (!notifications || notifications.length === 0) {
            container.innerHTML = `
                <div class="text-center py-4">
                    <i class="bi bi-inbox fs-1 text-muted"></i>
                    <p class="text-muted mt-2 mb-0">No notifications</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = notifications.map(notif => `
            <div class="notification-item p-3 border-bottom ${notif.is_read ? '' : 'bg-light'}" 
                 onclick="markRead(${notif.id}, '${notif.type}', ${notif.form_id || 'null'})" 
                 style="cursor: pointer;">
                <div class="d-flex">
                    <div class="me-3">
                        <i class="bi ${getNotificationIcon(notif.type)} fs-5 ${getNotificationColor(notif.type)}"></i>
                    </div>
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between">
                            <strong class="small">${escapeHtml(notif.title)}</strong>
                            <small class="text-muted">${getTimeAgo(notif.created_at)}</small>
                        </div>
                        <p class="mb-0 small text-muted">${escapeHtml(notif.message.substring(0, 80))}${notif.message.length > 80 ? '...' : ''}</p>
                        ${notif.form_id ? `<small class="text-primary">Form #${notif.form_id}</small>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    // Get icon based on notification type
    function getNotificationIcon(type) {
        const icons = {
            'form_submitted': 'bi-file-earmark-check',
            'approval_needed': 'bi-clock-history',
            'approved': 'bi-check-circle-fill',
            'rejected': 'bi-x-circle-fill',
            'archived': 'bi-archive'
        };
        return icons[type] || 'bi-info-circle';
    }
    
    // Get color based on notification type
    function getNotificationColor(type) {
        const colors = {
            'form_submitted': 'text-primary',
            'approval_needed': 'text-warning',
            'approved': 'text-success',
            'rejected': 'text-danger',
            'archived': 'text-info'
        };
        return colors[type] || 'text-secondary';
    }
    
    // Mark a notification as read
    async function markRead(notificationId, type, formId) {
        try {
            await fetch('/qams/api/notifications.php', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: notificationId })
            });
            
            // Refresh list
            loadNotifications();
            
            // Close panel
            document.getElementById('notificationPanel').style.display = 'none';
            
            // If it's an approval notification, redirect
            if (type === 'approval_needed' && formId) {
                const userRole = sessionStorage.getItem('userRole');
                if (userRole === 'teacher') {
                    // Stay on teacher panel
                } else if (userRole === 'dept_head') {
                    window.location.href = `/qams/Dept_Head/dept_head-panel.html?form_id=${formId}`;
                } else if (userRole === 'dean') {
                    window.location.href = `/qams/Dean/dean-verification.html?form_id=${formId}`;
                }
            }
        } catch (error) {
            console.error('Error marking read:', error);
        }
    }
    
    // Mark all notifications as read
    async function markAllRead() {
        try {
            await fetch('/qams/api/notifications.php', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: 'all' })
            });
            loadNotifications();
        } catch (error) {
            console.error('Error marking all read:', error);
        }
    }
    
    // Format time ago
    function getTimeAgo(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const seconds = Math.floor((now - date) / 1000);
        
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return date.toLocaleDateString();
    }
    
    // Escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Load notifications on page load
    loadNotifications();
    
    // Auto-refresh every 30 seconds
    setInterval(loadNotifications, 30000);
    
    // Close notification panel when clicking outside
    document.addEventListener('click', function(event) {
        const panel = document.getElementById('notificationPanel');
        const bell = document.querySelector('.btn-outline-secondary.btn-sm.position-relative');
        if (panel && bell && !panel.contains(event.target) && !bell.contains(event.target)) {
            panel.style.display = 'none';
        }
    });
    </script>
