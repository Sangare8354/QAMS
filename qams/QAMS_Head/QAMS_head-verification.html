<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAMS Head Verification Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary"><i class="bi bi-clipboard-check me-2"></i>QAMS Head Verification Panel</h2>
        <div>
            <a href="QAMS_head-panel.html" class="btn btn-outline-secondary me-2"><i class="bi bi-arrow-left me-1"></i>Back</a>
            <button class="btn btn-outline-info me-2" onclick="showHelp()"><i class="bi bi-question-circle me-1"></i>Help</button>
            <a href="../Login/index.html" class="btn btn-danger"><i class="bi bi-box-arrow-right me-1"></i>Sign Out</a>
        </div>
    </div>

    <!-- QAMS Head Information -->
    <div class="card shadow-sm border-0 mb-4 rounded-4">
        <div class="card-header bg-white border-0 py-3"><h5 class="fw-bold text-secondary mb-0"><i class="bi bi-person-badge me-2"></i>QAMS Head Information</h5></div>
        <div class="card-body row g-3">
            <div class="col-md-4"><label class="form-label fw-semibold">Name</label><input type="text" class="form-control" id="qamsName" readonly></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Faculty Name</label><input type="text" class="form-control" value="All Faculties (University-wide)" readonly></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Program Name</label><input type="text" class="form-control" value="Quality Assurance Management System" readonly></div>
            <div class="col-md-3"><label class="form-label fw-semibold">Semester</label><input type="text" class="form-control" id="qamsSemester" readonly></div>
            <div class="col-md-3"><label class="form-label fw-semibold">Year</label><input type="text" class="form-control" id="qamsYear" readonly></div>
            <div class="col-md-3"><label class="form-label fw-semibold">Designation</label><input type="text" class="form-control" value="QAMS Head (IQAC)" readonly></div>
            <div class="col-md-3"><label class="form-label fw-semibold">Employee ID</label><input type="text" class="form-control" id="qamsEmpId" readonly></div>
        </div>
    </div>

    <!-- Form Details Header -->
    <div class="card shadow-sm border-0 mb-4" id="formHeader" style="display: none;">
        <div class="card-body p-3 bg-light">
            <div class="row align-items-center">
                <div class="col-md-8"><h5 class="mb-0"><i class="bi bi-file-text me-2 text-primary"></i><span id="formNumber">Form Number</span></h5><small class="text-muted" id="formStatusBadge"></small></div>
                <div class="col-md-4 text-end"><span class="badge bg-info" id="currentStatus">Status</span></div>
            </div>
        </div>
    </div>

    <!-- Form Content -->
    <div class="card shadow-sm">
        <div class="card-header bg-secondary text-white fw-bold"><i class="bi bi-list-check me-2"></i>Final Verification & Archive</div>
        <div class="card-body" id="formContent"><div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="text-muted mt-2">Loading form details...</p></div></div>
    </div>

    <!-- Action Buttons -->
    <div class="d-flex justify-content-between mt-4">
        <a href="QAMS_head-panel.html" class="btn btn-secondary btn-lg"><i class="bi bi-arrow-left me-2"></i>Back to Panel</a>
        <div id="actionButtons">
            <button class="btn btn-info btn-lg me-2" onclick="downloadPDF()">
            <i class="bi bi-file-pdf me-2"></i>Download Receipt
            </button>
            <button class="btn btn-warning btn-lg me-2" onclick="rejectForm()" id="rejectBtn"><i class="bi bi-x-circle me-2"></i>Reject & Return to Dean</button>
            <button class="btn btn-success btn-lg" onclick="approveForm()" id="approveBtn"><i class="bi bi-check-circle me-2"></i>Approve & Archive</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentFormId = null, currentFormData = null;

    document.addEventListener('DOMContentLoaded', function() {
        loadUserData();
        const urlParams = new URLSearchParams(window.location.search);
        const formId = urlParams.get('form_id');
        if (formId) { currentFormId = formId; loadFormDetails(formId); }
        else { showError('No form selected. Please go back to the QAMS Head Panel.'); document.getElementById('actionButtons').style.display = 'none'; }
    });

    async function loadUserData() {
        try {
            const response = await fetch('/qams/api/get-user-data.php');
            const data = await response.json();
            if (data.success) {
                const user = data.data.profile;
                document.getElementById('qamsName').value = user.full_name || 'Dr. Grace Mensah';
                document.getElementById('qamsEmpId').value = user.employee_id || 'QAMS-UCT-0001';
                document.getElementById('qamsSemester').value = data.data.current_semester || 'Semester 5';
                document.getElementById('qamsYear').value = data.data.current_year || '2025-26';
            }
        } catch (error) { console.error('Error loading user data:', error); }
    }

    async function loadFormDetails(formId) {
        try {
            const response = await fetch(`/qams/api/qams_head/view-form.php?id=${formId}`);
            const data = await response.json();
            if (data.success) { currentFormData = data.form; renderFormDetails(data.form); document.getElementById('formHeader').style.display = 'block'; }
            else { showError('❌ ' + data.message); }
        } catch (error) { console.error('Error:', error); showError('❌ Error loading form details'); }
    }

    function renderFormDetails(form) {
        document.getElementById('formNumber').textContent = form.form_number;
        let statusHtml = form.current_status === 'pending_qams' ? '<span class="badge bg-warning text-dark">Pending QAMS Approval</span>' : `<span class="badge bg-secondary">${form.current_status}</span>`;
        document.getElementById('currentStatus').innerHTML = statusHtml;

        let attendanceHtml = form.attendance_url ? `<div class="col-md-4"><a href="${form.attendance_url}" target="_blank" class="btn btn-outline-primary w-100"><i class="bi bi-file-pdf-fill text-danger"></i> Attendance Sheet</a></div>` : `<div class="col-md-4"><button class="btn btn-outline-secondary w-100" disabled><i class="bi bi-file-pdf-fill"></i> Not Uploaded</button></div>`;
        let midtermHtml = form.midterm_url ? `<div class="col-md-4"><a href="${form.midterm_url}" target="_blank" class="btn btn-outline-primary w-100"><i class="bi bi-file-pdf-fill text-danger"></i> Midterm Question</a></div>` : `<div class="col-md-4"><button class="btn btn-outline-secondary w-100" disabled><i class="bi bi-file-pdf-fill"></i> Not Uploaded</button></div>`;
        let finalHtml = form.final_url ? `<div class="col-md-4"><a href="${form.final_url}" target="_blank" class="btn btn-outline-primary w-100"><i class="bi bi-file-pdf-fill text-danger"></i> Final Question</a></div>` : `<div class="col-md-4"><button class="btn btn-outline-secondary w-100" disabled><i class="bi bi-file-pdf-fill"></i> Not Uploaded</button></div>`;

        document.getElementById('formContent').innerHTML = `
            <div class="row mb-3">
                <div class="col-md-6"><label class="fw-semibold">Teacher</label><div class="bg-light p-3 rounded"><p class="mb-1"><strong>${escapeHtml(form.teacher_name)}</strong></p><p class="mb-1">${escapeHtml(form.teacher_email)}</p><p>ID: ${form.teacher_emp_id || 'N/A'}</p></div></div>
                <div class="col-md-6"><label class="fw-semibold">Department Head</label><div class="bg-light p-3 rounded"><p class="mb-1"><strong>${escapeHtml(form.dept_head_name)}</strong></p><p>${escapeHtml(form.dept_head_email)}</p></div></div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4"><label class="fw-semibold">Dean</label><div class="bg-light p-3 rounded"><p><strong>${escapeHtml(form.dean_name)}</strong><br>${escapeHtml(form.dean_email)}</p></div></div>
                <div class="col-md-4"><label class="fw-semibold">Course</label><div class="bg-light p-3 rounded"><p><strong>${escapeHtml(form.course_code)}</strong><br>${escapeHtml(form.course_title)}<br>Credits: ${form.credit_hours || 'N/A'}</p></div></div>
                <div class="col-md-4"><label class="fw-semibold">Academic Info</label><div class="bg-light p-3 rounded"><p>${escapeHtml(form.year_name)} | Sem ${form.semester_number}<br>Section: ${escapeHtml(form.section || 'A')}<br>Dept: ${escapeHtml(form.department_name)}<br>Faculty: ${escapeHtml(form.faculty_name)}</p></div></div>
            </div>
            <hr>
            <h6 class="fw-bold text-primary mb-3"><i class="bi bi-clipboard-data me-2"></i>Quality Assurance Data</h6>
            <div class="row mb-3">
                <div class="col-md-6"><label>Zoom Link:</label><p><a href="${escapeHtml(form.zoom_link)}" target="_blank">${escapeHtml(form.zoom_link)}</a></p></div>
                <div class="col-md-6"><label>Classes Taken:</label><p>${form.classes_taken || 0}</p></div>
                <div class="col-md-3"><label>Class Tests:</label><p>${form.class_tests || 0}</p></div>
                <div class="col-md-3"><label>Midterm:</label><p>${form.midterm_conducted ? 'Yes' : 'No'}</p></div>
                <div class="col-md-3"><label>Final:</label><p>${form.final_conducted ? 'Yes' : 'No'}</p></div>
                <div class="col-md-3"><label>Assignments:</label><p>${form.assignments || 0}</p></div>
                <div class="col-md-3"><label>Presentations:</label><p>${form.presentations || 0}</p></div>
            </div>
            <hr>
            <h6 class="fw-bold text-primary mb-3"><i class="bi bi-file-earmark-pdf me-2"></i>Uploaded Documents</h6>
            <div class="row">${attendanceHtml}${midtermHtml}${finalHtml}</div>
            <hr>
            <h6 class="fw-bold text-primary mb-3"><i class="bi bi-clock-history me-2"></i>Approval Timeline</h6>
            <div class="row">
                <div class="col-md-4"><label>Submitted:</label><p class="bg-light p-2 rounded">${new Date(form.submitted_at).toLocaleString()}</p></div>
                <div class="col-md-4"><label>Dept Head Approved:</label><p class="bg-light p-2 rounded">${form.dept_approved_at ? new Date(form.dept_approved_at).toLocaleString() : 'Pending'}</p></div>
                <div class="col-md-4"><label>Dean Approved:</label><p class="bg-light p-2 rounded">${form.dean_approved_at ? new Date(form.dean_approved_at).toLocaleString() : 'Pending'}</p></div>
            </div>
        `;
    }

    async function approveForm() {
        if (!currentFormId || !currentFormData) { showToast('❌ No form selected'); return; }
        const comments = prompt('Optional comments:');
        if (confirm(`✅ Approve form ${currentFormData.form_number} and archive permanently?`)) {
            try {
                const response = await fetch('/qams/api/qams_head/approve.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ form_id: currentFormId, comments: comments || 'Final approval by QAMS Head' })
                });
                const data = await response.json();
                if (data.success) {
                    showToast('✅ ' + data.message);
                    document.getElementById('approveBtn').disabled = true; document.getElementById('rejectBtn').disabled = true;
                    document.getElementById('approveBtn').innerHTML = '<i class="bi bi-check-circle me-2"></i>Archived';
                    document.getElementById('approveBtn').classList.replace('btn-success', 'btn-secondary');
                    document.getElementById('currentStatus').innerHTML = '<span class="badge bg-success">Approved & Archived</span>';
                    setTimeout(() => window.location.href = 'QAMS_head-panel.html', 2000);
                } else { showToast('❌ ' + data.message); }
            } catch (error) { showToast('❌ Connection error'); }
        }
    }

    async function rejectForm() {
        if (!currentFormId || !currentFormData) { showToast('❌ No form selected'); return; }
        const reason = prompt('Please provide reason for rejection (at least 10 characters):');
        if (!reason || reason.length < 10) { showToast('❌ Please provide a detailed reason'); return; }
        if (confirm(`⚠️ Reject form ${currentFormData.form_number} and return to Dean?`)) {
            try {
                const response = await fetch('/qams/api/qams_head/revert.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ form_id: currentFormId, reason: reason })
                });
                const data = await response.json();
                if (data.success) {
                    showToast('✅ ' + data.message);
                    document.getElementById('approveBtn').disabled = true; document.getElementById('rejectBtn').disabled = true;
                    document.getElementById('rejectBtn').innerHTML = '<i class="bi bi-x-circle me-2"></i>Rejected';
                    document.getElementById('rejectBtn').classList.replace('btn-warning', 'btn-secondary');
                    document.getElementById('currentStatus').innerHTML = '<span class="badge bg-danger">Rejected - Returned to Dean</span>';
                    setTimeout(() => window.location.href = 'QAMS_head-panel.html', 2000);
                } else { showToast('❌ ' + data.message); }
            } catch (error) { showToast('❌ Connection error'); }
        }
    }
   function downloadPDF() {
    if (currentFormId) {
        window.open(`/qams/api/generate-pdf.php?id=${currentFormId}`, '_blank');
    } else {
        showToast('❌ No form selected');
    }
}
    function showToast(msg) { const toast = document.createElement('div'); toast.className = 'position-fixed bottom-0 end-0 p-3 m-3 bg-dark text-white rounded shadow'; toast.style.zIndex = '9999'; toast.innerHTML = `<i class="bi bi-info-circle me-2"></i>${msg}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
    function showError(msg) { document.getElementById('formContent').innerHTML = `<div class="alert alert-danger text-center py-5"><i class="bi bi-exclamation-triangle-fill fs-1"></i><p class="mt-3">${msg}</p><a href="QAMS_head-panel.html" class="btn btn-primary">Return to Panel</a></div>`; document.getElementById('actionButtons').style.display = 'none'; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function showHelp() { alert("🆘 QAMS HEAD VERIFICATION HELP:\n\n📋 Review complete QAMS form with all approvals\n📄 View all PDF documents\n✅ APPROVE - Final approval and permanent archive\n❌ REJECT - Return to Dean with correction reason\n📁 Archived forms are permanently stored in database"); }
</script>
</body>
</html>
