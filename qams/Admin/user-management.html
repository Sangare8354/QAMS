<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - QAMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-lg">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-people-fill me-2"></i>User Management
            </span>
            <div class="d-flex">
                <a href="admin-dashboard.html" class="btn btn-light btn-sm me-2">
                    <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                </a>
                <a href="../Login/index.html" class="btn btn-danger btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Sign Out
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Filter Bar -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Filter by Role</label>
                                <select class="form-select" id="roleFilter" onchange="loadUsers()">
                                    <option value="all">All Roles</option>
                                    <option value="teacher">Teachers</option>
                                    <option value="dept_head">Department Heads</option>
                                    <option value="dean">Deans</option>
                                    <option value="qams_head">QAMS Heads</option>
                                    <option value="admin">Admins</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Filter by Status</label>
                                <select class="form-select" id="statusFilter" onchange="loadUsers()">
                                    <option value="all">All Status</option>
                                    <option value="active">Active</option>
                                    <option value="inactive">Inactive</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Search</label>
                                <input type="text" class="form-control" id="searchInput" placeholder="Search by name or email..." onkeyup="filterUsers()">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-primary w-100 mt-4" onclick="showAddUserModal()">
                                    <i class="bi bi-plus-circle me-2"></i>Add New User
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 pt-4">
                        <h5 class="fw-bold mb-0"><i class="bi bi-people me-2 text-primary"></i>System Users</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Full Name</th>
                                        <th>Username</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Department/Faculty</th>
                                        <th>Status</th>
                                        <th>Last Login</th>
                                        <th>Actions</th>
                                     </thead>
                                <tbody id="usersTableBody">
                                    <tr>
                                        <td colspan="9" class="text-center py-4">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                            <br>Loading users...
                                         </td>
                                     </table>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="userModalLabel"><i class="bi bi-person-plus me-2"></i>Add New User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userId" value="0">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="fullName" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="username" placeholder="username" required>
                                    <span class="input-group-text">@edu.gh</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
                                <select class="form-select" id="userRole" required onchange="toggleRoleFields()">
                                    <option value="">Select Role</option>
                                    <option value="teacher">Teacher</option>
                                    <option value="dept_head">Department Head</option>
                                    <option value="dean">Dean</option>
                                    <option value="qams_head">QAMS Head</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Employee ID <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="employeeId" placeholder="e.g., EMP-12345" required>
                            </div>
                            
                            <!-- Faculty Field -->
                            <div class="col-md-6" id="facultyField" style="display:none;">
                                <label class="form-label fw-semibold">Faculty <span class="text-danger">*</span></label>
                                <select class="form-select" id="facultyId">
                                    <option value="">Select Faculty</option>
                                    <option value="1">Faculty of Computing</option>
                                    <option value="2">Faculty of Engineering</option>
                                    <option value="3">Faculty of Business</option>
                                    <option value="4">Faculty of Health Sciences</option>
                                </select>
                            </div>
                            
                            <!-- Department Field -->
                            <div class="col-md-6" id="departmentField" style="display:none;">
                                <label class="form-label fw-semibold">Department <span class="text-danger">*</span></label>
                                <select class="form-select" id="departmentId">
                                    <option value="">Select Department</option>
                                    <option value="1">Computer Science</option>
                                    <option value="2">Information Technology</option>
                                    <option value="3">Software Engineering</option>
                                    <option value="4">Networks & Security</option>
                                    <option value="5">Telecommunications Engineering</option>
                                </select>
                            </div>
                            
                            <div class="col-12" id="passwordField">
                                <label class="form-label fw-semibold">Initial Password</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="userPassword" value="Welcome123" readonly>
                                    <button class="btn btn-outline-secondary" type="button" onclick="generatePassword()">
                                        <i class="bi bi-arrow-repeat"></i> Generate
                                    </button>
                                </div>
                                <small class="text-muted">User will be required to change password on first login</small>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveUser()">
                        <i class="bi bi-check-circle me-2"></i>Save User
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div class="modal fade" id="resetPasswordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title"><i class="bi bi-key me-2"></i>Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Reset password for <strong id="resetUserName"></strong></p>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Password</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="resetPassword" value="Reset123">
                            <button class="btn btn-outline-secondary" onclick="generateResetPassword()">
                                <i class="bi bi-arrow-repeat"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="text" class="form-control" id="confirmResetPassword">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-warning" onclick="confirmResetPassword()">Reset Password</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="successToast" class="toast align-items-center text-white bg-success border-0">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span id="toastMessage">Operation successful!</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let usersData = [];
        let currentResetUserId = null;
        let userModal, resetPasswordModal, successToast;

        document.addEventListener('DOMContentLoaded', function() {
            userModal = new bootstrap.Modal(document.getElementById('userModal'));
            resetPasswordModal = new bootstrap.Modal(document.getElementById('resetPasswordModal'));
            successToast = new bootstrap.Toast(document.getElementById('successToast'));
            loadUsers();
        });

        async function loadUsers() {
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            let url = '/qams/api/admin/users.php?';
            if (role !== 'all') url += `role=${role}&`;
            if (status !== 'all') url += `status=${status}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    usersData = data.users;
                    renderUsersTable(usersData);
                } else {
                    showToast('❌ Failed to load users');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ Connection error');
            }
        }

        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (!users || users.length === 0) {
                tbody.innerHTML = '常<td colspan="9" class="text-center py-4">No users found</td>常';
                return;
            }
            
            tbody.innerHTML = users.map(user => {
                const statusBadge = user.is_active ? 
                    '<span class="badge bg-success">Active</span>' : 
                    '<span class="badge bg-danger">Inactive</span>';
                
                let roleBadge = '';
                if (user.role === 'teacher') roleBadge = '<span class="badge bg-primary">Teacher</span>';
                else if (user.role === 'dept_head') roleBadge = '<span class="badge bg-success">Dept Head</span>';
                else if (user.role === 'dean') roleBadge = '<span class="badge bg-info">Dean</span>';
                else if (user.role === 'qams_head') roleBadge = '<span class="badge bg-warning text-dark">QAMS Head</span>';
                else if (user.role === 'admin') roleBadge = '<span class="badge bg-dark">Admin</span>';
                else roleBadge = `<span class="badge bg-secondary">${user.role}</span>`;
                
                const deptFaculty = user.department_name || user.faculty_name || 'N/A';
                const lastLogin = user.last_login ? new Date(user.last_login).toLocaleString() : 'Never';
                
                return `
                    <tr data-user-id="${user.id}">
                        <td>${user.employee_id || user.id}</td>
                        <td><strong>${escapeHtml(user.full_name)}</strong></td>
                        <td>${escapeHtml(user.username)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>${roleBadge}</td>
                        <td><small>${escapeHtml(deptFaculty)}</small></td>
                        <td>${statusBadge}</td>
                        <td><small>${lastLogin}</small></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="editUser(${user.id})" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-warning" onclick="openResetPassword(${user.id}, '${escapeHtml(user.full_name)}')" title="Reset Password">
                                <i class="bi bi-key"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-${user.is_active ? 'danger' : 'success'}" onclick="toggleUserStatus(${user.id}, ${user.is_active ? '0' : '1'})" title="${user.is_active ? 'Deactivate' : 'Activate'}">
                                <i class="bi bi-person-${user.is_active ? 'x' : 'check'}"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = usersData.filter(user => 
                user.full_name.toLowerCase().includes(searchTerm) || 
                user.email.toLowerCase().includes(searchTerm) ||
                user.username.toLowerCase().includes(searchTerm)
            );
            renderUsersTable(filtered);
        }

        function showAddUserModal() {
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '0';
            document.getElementById('userPassword').value = 'Welcome123';
            document.getElementById('passwordField').style.display = 'block';
            document.getElementById('facultyField').style.display = 'none';
            document.getElementById('departmentField').style.display = 'none';
            document.getElementById('userModalLabel').innerHTML = '<i class="bi bi-person-plus me-2"></i>Add New User';
            userModal.show();
        }

        async function editUser(userId) {
            const user = usersData.find(u => u.id === userId);
            if (!user) return;
            
            document.getElementById('userId').value = user.id;
            document.getElementById('fullName').value = user.full_name;
            document.getElementById('username').value = user.username;
            document.getElementById('userRole').value = user.role;
            document.getElementById('employeeId').value = user.employee_id || '';
            
            if (user.faculty_id) document.getElementById('facultyId').value = user.faculty_id;
            if (user.department_id) document.getElementById('departmentId').value = user.department_id;
            
            document.getElementById('passwordField').style.display = 'none';
            document.getElementById('userModalLabel').innerHTML = '<i class="bi bi-pencil-square me-2"></i>Edit User';
            
            toggleRoleFields();
            userModal.show();
        }

        function toggleRoleFields() {
            const role = document.getElementById('userRole').value;
            const facultyField = document.getElementById('facultyField');
            const departmentField = document.getElementById('departmentField');
            
            facultyField.style.display = 'none';
            departmentField.style.display = 'none';
            
            if (role === 'dean') {
                facultyField.style.display = 'block';
            } else if (role === 'dept_head' || role === 'teacher') {
                facultyField.style.display = 'block';
                departmentField.style.display = 'block';
            }
        }

        function generatePassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$';
            let password = '';
            for (let i = 0; i < 10; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('userPassword').value = password;
        }

        async function saveUser() {
            const userId = document.getElementById('userId').value;
            const fullName = document.getElementById('fullName').value;
            const username = document.getElementById('username').value;
            const role = document.getElementById('userRole').value;
            const employeeId = document.getElementById('employeeId').value;
            const password = document.getElementById('userPassword').value;
            const facultyId = document.getElementById('facultyId').value;
            const departmentId = document.getElementById('departmentId').value;
            
            if (!fullName || !username || !role || !employeeId) {
                showToast('❌ Please fill all required fields');
                return;
            }
            
            const userData = {
                full_name: fullName,
                username: username,
                role: role,
                employee_id: employeeId,
                faculty_id: facultyId || null,
                department_id: departmentId || null
            };
            
            if (userId === '0') {
                userData.password = password;
                const response = await fetch('/qams/api/admin/users.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await response.json();
                if (data.success) {
                    showToast('✅ User created successfully');
                    userModal.hide();
                    loadUsers();
                } else {
                    showToast('❌ ' + data.message);
                }
            } else {
                userData.id = parseInt(userId);
                const response = await fetch('/qams/api/admin/users.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await response.json();
                if (data.success) {
                    showToast('✅ User updated successfully');
                    userModal.hide();
                    loadUsers();
                } else {
                    showToast('❌ ' + data.message);
                }
            }
        }

        function openResetPassword(userId, userName) {
            currentResetUserId = userId;
            document.getElementById('resetUserName').textContent = userName;
            document.getElementById('resetPassword').value = 'Reset' + Math.floor(Math.random() * 1000);
            document.getElementById('confirmResetPassword').value = '';
            resetPasswordModal.show();
        }

        function generateResetPassword() {
            const newPassword = 'Reset' + Math.floor(Math.random() * 1000);
            document.getElementById('resetPassword').value = newPassword;
        }

        async function confirmResetPassword() {
            const newPassword = document.getElementById('resetPassword').value;
            const confirmPassword = document.getElementById('confirmResetPassword').value;
            
            if (newPassword !== confirmPassword) {
                showToast('❌ Passwords do not match');
                return;
            }
            
            const response = await fetch('/qams/api/admin/users.php', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: currentResetUserId, password: newPassword })
            });
            const data = await response.json();
            
            if (data.success) {
                showToast('✅ Password reset successfully');
                resetPasswordModal.hide();
            } else {
                showToast('❌ ' + data.message);
            }
        }

        async function toggleUserStatus(userId, active) {
            const action = active ? 'activate' : 'deactivate';
            if (confirm(`⚠️ ${action} this user?`)) {
                const response = await fetch('/qams/api/admin/users.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: userId, is_active: active })
                });
                const data = await response.json();
                if (data.success) {
                    showToast(`✅ User ${action}d successfully`);
                    loadUsers();
                } else {
                    showToast('❌ ' + data.message);
                }
            }
        }

        function showToast(message) {
            document.getElementById('toastMessage').textContent = message;
            successToast.show();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
